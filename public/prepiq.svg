<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="120" y1="80" x2="680" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="55%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>

    <!-- Soft Ambient Glow -->
    <radialGradient id="ambient" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#C7D2FE" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#C7D2FE" stop-opacity="0"/>
    </radialGradient>

    <!-- Main Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur2"/>

      <feMerge result="merged">
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
      </feMerge>

      <feColorMatrix
        in="merged"
        type="matrix"
        values="
          0 0 0 0 0.39
          0 0 0 0 0.40
          0 0 0 0 0.95
          0 0 0 .65 0"/>

      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft Background Blur -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Rounded Background -->
  <rect
      width="800"
      height="800"
      rx="180"
      fill="url(#bg)"/>

  <!-- Ambient Light -->
  <circle
      cx="400"
      cy="390"
      r="220"
      fill="url(#ambient)"
      filter="url(#blur)"/>

  <!-- Logo -->
  <g transform="translate(165 160) scale(1.15)">

    <!-- Bulb -->
    <circle
        cx="80"
        cy="55"
        r="24"
        fill="white"
        filter="url(#glow)"/>

    <!-- Rays -->
    <g fill="white" filter="url(#glow)">
      <polygon points="76,8 84,8 80,20"/>
      <polygon points="76,102 84,102 80,90"/>

      <polygon points="32,51 32,59 46,55"/>
      <polygon points="128,51 128,59 114,55"/>

      <polygon points="52,24 58,30 47,37"/>
      <polygon points="108,24 102,30 113,37"/>

      <polygon points="52,86 58,80 47,73"/>
      <polygon points="108,86 102,80 113,73"/>
    </g>

    <!-- Stem -->
    <rect
        x="62"
        y="126"
        width="36"
        height="170"
        rx="18"
        fill="white"
        filter="url(#glow)"/>

    <!-- Magnifying Glass -->
    <circle
        cx="255"
        cy="210"
        r="86"
        stroke="white"
        stroke-width="34"
        filter="url(#glow)"/>

    <!-- Handle -->
    <path
        d="M296 266 L350 320"
        stroke="white"
        stroke-width="34"
        stroke-linecap="round"
        filter="url(#glow)"/>

    <!-- Insight Lines -->
    <path
        d="M320 340 H370"
        stroke="white"
        stroke-width="12"
        stroke-linecap="round"
        filter="url(#glow)"/>

    <path
        d="M330 360 H360"
        stroke="white"
        stroke-width="12"
        stroke-linecap="round"
        filter="url(#glow)"/>
  </g>
</svg>