<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/prepiq.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

     <!-- SEO -->
    <meta name="description" content="AI-powered technical interview prep that reverse-engineers job descriptions to find your knowledge gaps." />
    <meta name="keywords" content="interview prep, AI, technical interview, Gemini AI, flashcards, study plan" />

    <!-- Open Graph -->
    <meta property="og:title" content="PrepIQ — AI Technical Interview Prep" />
    <meta property="og:description" content="Reverse-engineer job descriptions with Gemini AI to ace your next tech interview." />
    <meta property="og:url" content="https://prep-iq.web.app" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PrepIQ — AI Technical Interview Prep" />
    <meta name="twitter:description" content="Reverse-engineer job descriptions with Gemini AI to ace your next tech interview." />
    <title>PrepIQ | AI Interview Prep</title>
    <!-- Prevent dark mode flash by applying theme synchronously -->
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('theme');
          if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.add('light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
